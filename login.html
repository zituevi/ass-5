<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen">

    <div class="flex flex-col items-center gap-6 bg-white p-10 rounded-2xl shadow-xl border border-gray-100 w-full max-w-sm">
        
        <div class="flex flex-col items-center">
            <img class="w-16 mb-2" src="./assets/github-logo.png" alt="GitHub Logo">
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-400 text-sm">Sign in to manage your issues</p>
        </div>

        <form id="login-form" class="fieldset w-full">
            <legend class="fieldset-legend text-gray-500">Login Details</legend>

            <label class="fieldset-label text-gray-700 font-semibold">Username</label>
            <input type="text" id="username" class="input w-full bg-gray-50 border-gray-200" placeholder="admin" required />

            <label class="fieldset-label text-gray-700 font-semibold mt-4">Password</label>
            <input type="password" id="password" class="input w-full bg-gray-50 border-gray-200" placeholder="admin123" required />

            <button type="submit" class="btn bg-[#4A00FF] hover:bg-violet-700 text-white border-none mt-6 w-full">
                Sign In
            </button>
            
            <p id="error-msg" class="text-red-500 text-xs mt-3 text-center hidden">Invalid Username or Password!</p>
        </form>
    </div>

    <script src="./login.js"></script>
</body>
</html>
