<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"rel="stylesheet"type="text/css"/>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="./tailwind.css" />
    
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  </head>

<body class="bg-[#F8FAFC]">

    <navbar>

    <div class="navbar shadow-sm">
      <div class="flex-1">
        <a class="btn btn-ghost text-xl">
          <img class="w-8" src="./assets/github-logo.png" alt="" /> GitHubIssues Tracker</a>
      </div>
      <div class="flex gap-2">
        <input
            type="text"
            placeholder=" 🔍 Search issues..."
            class="input input-bordered w-24 md:w-auto"/>
      <button class="btn btn-primary">+ New Issue</button>
        <div class="dropdown dropdown-end">
          <div
               tabindex="0"
               role="button"
               class="btn btn-ghost btn-circle avatar"></div>
              <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
               <li>
                 <a class="justify-between">
                  Profile
                   <span class="badge">New</span>
                 </a>
               </li>
               <li><a>Settings</a></li>
               <li><a>Logout</a></li>
             </ul>
           </div>
         </div>
       </div>
     </navbar>
  <div class="mx-60 py-6 px-6">
  <navbar>
    <div class="bg-white py-4 px-4 rounded-lg shadow">
      <button id="btn-all" class="py-4 btn btn-primary">All</button>
         <button id="btn-open" class="py-4 btn btn-primary">Open<button>
           <button id="btn-closed"class="py-4 btn btn-primary">Closed</button>
         </div>
       </navbar>
     </div>

    <div class="mx-60 py-6 px-6">
      <div
        class="bg-white py-4 px-4 rounded-lg shadow flex justify-between items-center"
      >
        <div class="flex items-center gap-4">
          <img src="./assets/Aperture.png" alt="" class="w-8 h-8" />

          <div>
            <h1 id="open-count" class="text-2xl font-semibold">50 Issues</h1>
            <p class="text-gray-500 text-sm">Track and manage your issues</p>
          </div>
        </div>

         <div class="flex items-center gap-6">
           <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-400"></div>
            <span>Open</span>
           </div>

           <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-violet-600"></div>
             <span>Closed</span>
           </div>
         </div>
      </div>

      <div class="master-container  bg-[#F8FAFC] shadow rounded-lg mt-2 grid grid-cols-4 gap-2"
      >
         <div class="mainn-container  bg-white rounded-xl m-2 ">
           <div class="issue-summary-card px-2 p-2">
             <div class="making-card flex items-center gap-30">
               <img src="./assets/open_status.png" class="w-5 h-5"  alt="" />
               <div class="bg-red-100 rounded-full px-4 py-0.5 text-red-500 text-m font-semibold">High</div>
               </div>
               <div class="flex flex-col">
               <h1 class="font-semibold">
                 Fix navigation menu on mobile devices
               </h1>
               <p class="text-[#64748B]">
                The navigation menu doesn't collapse properly on mobile
                devices...
               </p>
              </div>
          </div>
          <div class="bug-help flex gap-4">
               <div class="poka bg-red-100 rounded-full border-red-900 p-1">
                 <i class="fa-solid fa-bug"></i><span  class="text-red-600"> BUG</span>
               </div>
               <div class="help bg-amber-100 rounded-full border-amber-400 p-1">
                 <i class="fa-solid fa-life-ring"></i><span class="text-amber-500"> Help Wanted</span>
               </div>
             </div>
             <hr class=" border-[#64748B50] my-4" />
             <div>#1by john_doe</div>
             <div>1/15/2024</div>
           </div>
         </div>
          </div>
    </div>
    <script src="./script.js"></script>

<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
  <div class="bg-white rounded-lg shadow-lg w-200 h-120 p-6 relative">
    <button id="modal-close" class="absolute bottom-2 right-2 bg-[#4A00FF] p-2 rounded-sm text-gray-200 hover:text-gray-900 text-xl">Close</button>
    <h2 id="modal-title" class="text-xl font-bold mb-2"></h2>
    <p id="modal-desc" class="text-gray-700 mb-4"></p>
    <div class="flex gap-2">
      <span id="modal-status" class="text-white text-sm px-2 py-1 rounded-full"></span>
      <span id="modal-type" class="text-white text-sm px-2 py-1 rounded-full "></span>
    </div>
    <div class="mt-4 text-gray-500 text-sm" id="modal-footer"></div>
  </div>
</div>


  </body>
</html>
